{{/* This template does not create a CSV (this should be done by OLM).
The existing CSV is deleted when uninstalling the subchart, with the help of helm hooks.*/}}
apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: observability-operator.{{ .Values.observabilityOperatorVersion }}
  namespace: {{ include "observability.namespace" . }}
  annotations:
    "helm.sh/hook": "post-delete"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
