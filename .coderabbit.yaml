reviews:
  auto_review:
    enabled: true
    drafts: false
    ignore_usernames:
      - 'dependabot[bot]'
      - 'red-hat-konflux[bot]'
  high_level_summary: true
  high_level_summary_placeholder: '@coderabbitai summary'
  high_level_summary_instructions: |
    IMPORTANT: Preserve any existing text the author wrote in the PR description.
    Place author-provided content first, then append the AI-generated sections below it.
    Use the markers shown below to clearly separate human and AI content.

    Generate the following, appended AFTER any existing author description:

    ---
    *The following was generated by @coderabbitai and may be updated automatically.*

    ## Summary
    <Concise summary of the change with motivation and context. Include a link to the JIRA ticket if referenced in the PR title or commits.>

    @coderabbitai summary

    ## Checklist (Definition of Done)
    Generate a checklist based on the PR content. Include ONLY items that are relevant to the changes:
    - Always include "CI and all relevant tests are passing"
    - Include test-related items only if code logic changed (skip for docs-only, config-only, or dependency bumps)
    - Include RDS item only if database migrations or RDS configuration changed
    - Include AWS limits item only if new AWS resources are provisioned
    - Include secrets item only if secrets, credentials, or vault references changed
    - Include security item only if auth, access control, or sensitive data handling changed
    - Include documentation item only if dev setup, APIs, or workflows changed
    Render each selected item as a markdown checkbox (- [ ] item text).
    Available checklist items:
    - [ ] Unit and integration tests added
    - [ ] Added test description under `Test manual`
    - [ ] Documentation added if necessary (i.e. changes to dev setup, test execution, ...)
    - [ ] CI and all relevant tests are passing
    - [ ] Discussed security and business related topics privately
    - [ ] Add secret to app-interface Vault or Secrets Manager if necessary
    - [ ] RDS changes were e2e tested [manually](docs/development/howto-e2e-test-rds.md)
    - [ ] Check AWS limits are reasonable for changes provisioning new resources

    ## Test manual
    <Suggest manual testing steps based on the changes, or write "N/A" if not applicable.>

    ---
  auto_title_placeholder: '@coderabbitai'
  auto_title_instructions: |
    If a JIRA ticket ID matching the pattern ROX-<number> is found in the branch name,
    commit messages, or PR description, use this format:
      ROX-12345: <short imperative description>

    If no JIRA ticket ID is found, use conventional commit format:
      <type>(<scope>): <short imperative description>

    Where type is one of: feat, fix, chore, docs, refactor, test, ci, build, perf.
    Scope should be a short identifier for the area of the codebase (e.g. fleetshard, central, probe, emailsender, api, db, deps).
  poem: false
chat:
  auto_reply: true
